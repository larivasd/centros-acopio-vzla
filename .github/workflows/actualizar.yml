name: Actualizar centros de acopio

# Se ejecuta cada hora (en punto) y también se puede lanzar a mano.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

# Evita que dos corridas se pisen.
concurrency:
  group: actualizar-centros
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  investigar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ejecutar agente de investigación
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODELO: claude-sonnet-4-6
          MAX_NUEVOS: "25"
        run: node scripts/investigar.mjs

      - name: Hacer commit si hubo cambios
        run: |
          if [ -n "$(git status --porcelain data/centros.json)" ]; then
            git config user.name "Agente Acopio"
            git config user.email "actions@github.com"
            git add data/centros.json
            git commit -m "auto: actualización de centros de acopio ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
            echo "✅ Cambios publicados."
          else
            echo "Sin cambios; no se hace commit."
          fi
